services:
  - type: web
    name: rental-suite-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: pnpm install && pnpm db:generate && pnpm --filter @rental-suite/api build
    startCommand: node apps/api/dist/index.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
